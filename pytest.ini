[pytest]
testpaths = tests

# Marcadores para agrupar pruebas
markers =
    smoke: Pruebas rápidas y críticas
    regression: Pruebas completas de regresión

# Opciones de ejecución por defecto:
# -v: Modo detallado
# --html=report.html: Genera reporte HTML
# --self-contained-html: Reporte en un solo archivo
addopts = -v --html=report.html --self-contained-html

# --- CONFIGURACIÓN DE LOGGING ---
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S

log_file = execution.log
log_file_level = INFO
log_file_format = %(asctime)s [%(levelname)s] %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S